name: Auto RC

# Tags every push to main as `v<pubspec-version>-rc<N>` and triggers
# release.yml to build a pre-release APK. Manual `vX.Y.Z` tags continue to
# work unchanged via release.yml's own `push: tags: ['v*']` trigger.

on:
  push:
    branches: [main]

permissions:
  contents: write   # push the new tag
  actions: write    # workflow_dispatch release.yml

# Serialize runs so two quick merges can't both compute the same NEXT rc number
# before either has pushed a tag.
concurrency:
  group: auto-rc
  cancel-in-progress: false

jobs:
  tag-and-release:
    name: Tag main as RC and dispatch release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need existing rc tags locally to compute the next-available N.
          fetch-tags: true

      - name: Derive RC tag
        id: tag
        run: |
          VERSION_RAW=$(grep -E '^version:' pubspec.yaml | awk '{print $2}')
          # Strip the +N build metadata suffix (e.g. 0.1.0+0 -> 0.1.0).
          VERSION=${VERSION_RAW%%+*}
          # Compute next-available rcN by scanning existing tags. GITHUB_RUN_NUMBER
          # is unsafe because it's per-workflow and starts at 1 — it collides with
          # any rc tags that existed before this workflow shipped (rc1..rc8 in
          # this repo's history, from manual releases).
          HIGHEST=$(git tag -l "v${VERSION}-rc*" \
            | sed -E "s/^v${VERSION}-rc//" \
            | grep -E '^[0-9]+$' \
            | sort -n | tail -1)
          NEXT=$(( ${HIGHEST:-0} + 1 ))
          TAG="v${VERSION}-rc${NEXT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tagging $GITHUB_SHA as $TAG (highest existing: ${HIGHEST:-none})"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tags pushed by GITHUB_TOKEN do NOT fire workflows gated on
          # `push: tags:` (GitHub blocks token-triggered workflow chains
          # to prevent recursion). workflow_dispatch is the documented
          # exception, so we trigger release.yml explicitly with the tag
          # as its ref — that makes release.yml check out the tagged
          # commit and pass its "tag is reachable from main" guard.
          gh workflow run release.yml \
            --ref "${{ steps.tag.outputs.tag }}" \
            -F tag="${{ steps.tag.outputs.tag }}"
