name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages and mint the OIDC token the deploy
# action uses to authenticate. `contents: read` is the default but spelled out
# so the permissions block is self-documenting.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time. We do NOT cancel an in-flight
# deploy — the deploy-pages action recommends letting it finish so the live
# site is never left in a half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install dependencies
        run: flutter pub get

      # web/ and android/ are gitignored (see CLAUDE.md "Web — one-time asset
      # setup" and "Building Android APKs"). Scaffold both fresh on every CI
      # run. android/ isn't deployed to Pages but flutter_launcher_icons reads
      # `android: true` from pubspec.yaml and needs android/AndroidManifest.xml
      # to exist — without it the generator aborts and the whole job fails.
      # --org app matches release.yml / build-apk.yml so the scaffolded layout
      # is identical across workflows.
      - name: Scaffold web and android platforms
        run: flutter create --platforms=web,android --org app .

      # web/ is scaffolded fresh each run, so launcher icons + manifest icons
      # must be regenerated into web/icons/ — otherwise the deployed PWA ships
      # with the default Flutter icon.
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Write Drift web worker entrypoint
        run: |
          cat > web/drift_worker.dart <<'EOF'
          import 'package:drift/wasm.dart';

          void main() {
            WasmDatabase.workerMainForOpen();
          }
          EOF

      - name: Compile Drift web worker
        run: dart compile js -O4 -o web/drift_worker.dart.js web/drift_worker.dart

      - name: Download sqlite3.wasm matching pubspec.lock
        run: |
          SQLITE_VERSION=$(grep -A7 "^  sqlite3:$" pubspec.lock | grep version | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$SQLITE_VERSION" ]; then
            echo "::error::Could not resolve sqlite3 version from pubspec.lock" >&2
            exit 1
          fi
          echo "Using sqlite3 v$SQLITE_VERSION"
          curl -fL -o web/sqlite3.wasm \
            "https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-${SQLITE_VERSION}/sqlite3.wasm"

      # The live web app now lives under the /app/ subpath so the marketing
      # landing page can own the project root. --base-href must match that
      # subpath (https://mathrb.github.io/dartlodge/app/) or asset URLs and
      # go_router routes resolve to the wrong path and the app 404s on reload.
      - name: Build web bundle
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
        run: |
          flutter build web --release \
            --base-href "/dartlodge/app/" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT"

      # Assemble the published site:
      #   /             → marketing landing page (web_extra/landing/)
      #   /app/         → the live Flutter web app (base-href /dartlodge/app/)
      #   /privacy.html → standalone privacy policy — URL UNCHANGED (it is on the
      #                   Play Console Data Safety form). Source of truth:
      #                   docs/legal/privacy-policy.md.
      #   /404.html     → the app's index (base-href /dartlodge/app/). GitHub Pages
      #                   serves it for ANY unmatched path under /dartlodge/; its
      #                   purpose is to let deep /app/ go_router routes survive a
      #                   hard refresh (a typo'd root path just boots the app).
      - name: Assemble Pages site
        run: |
          rm -rf _site
          mkdir -p _site/app
          cp -r build/web/. _site/app/
          cp -r web_extra/landing/. _site/
          # Guard against locally-generated render-verify previews being published.
          rm -f _site/_preview-*.png
          # Favicon: copy from the scaffolded web/ dir — the authoritative source
          # (created earlier this job by `flutter create --platforms=web` +
          # `flutter_launcher_icons`), always present since the build step needs it.
          cp web/favicon.png _site/favicon.png
          cp web_extra/privacy.html _site/privacy.html
          cp build/web/index.html _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
