name: dart_lodge
description: Local-first open-source darts scoring and statistics app for Android, iOS, and web.
version: 1.0.0+0

environment:
  # Dart 3.12 floor: the resolved graph requires it (drift 2.34 / sqlite3 3.x
  # need ≥3.10, and camera_android_camerax 0.7.2+ pulls the floor to 3.12).
  # Ships with Flutter 3.44+.
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # Routing
  go_router: ^17.1.0
  
  # Database (drift everywhere: NativeDatabase on mobile/desktop, WasmDatabase on web)
  # sqlite3 3.x bundles the native SQLite library itself via Dart build hooks
  # (native assets) — no sqlite3_flutter_libs, no Android load workaround (#126).
  drift: ^2.34.0
  sqlite3: ^3.3.3
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Utility packages
  uuid: ^4.5.2
  intl: ^0.20.2
  
  # UI components
  google_fonts: ^6.2.0
  fl_chart: ">=0.69.0 <2.0.0"

  # Error monitoring
  sentry_flutter: ^9.16.1

  # Screen wakelock
  wakelock_plus: ^1.6.0

  # Auto-scorer training-data export (#381): zip the captured frames + sidecars
  # and hand them to the OS share sheet (no photo-library permission needed).
  # No existing dep covers zip archiving or the share sheet.
  # Capped below 4.0.0: capture_io.dart uses the 3.x ZipFileEncoder API
  # (`ZipFileEncoder.STORE`), which archive 4.x removed. Without the cap the
  # `flutter create` re-resolve in CI upgrades to 4.0.9 and the build fails
  # (`Member not found: 'STORE'`). Migrate to the 4.x API in a separate PR.
  archive: ">=3.6.1 <4.0.0"
  # ^13.x: 10.x pins win32 ^5.5.3, conflicting with package_info_plus ^10.1.0's
  # win32 ^6.0.1 (transitive via wakelock_plus).
  share_plus: ^13.1.0

  # Auto-scorer on-device detection (#378). image: 800×800 center-crop/resize
  # preprocessing parity (already transitive via archive; pinned direct here).
  # ultralytics_yolo: the first-party YOLO Flutter plugin (mobile only — the
  # detector impl is web-stubbed behind a conditional import).
  image: ^4.3.0
  ultralytics_yolo: ^0.6.4
  # Assist-mode camera capture (#382). Raw frames → FramePreprocessor (800×800
  # center-crop, training parity §2) → detector. Mobile only; the capture UI is
  # gated behind the default-off "use auto-scoring" toggle and platform checks.
  camera: ">=0.11.0 <0.13.0"

  # Settings / preferences
  shared_preferences: ^2.3.4
  # Pinned via caret to match wakelock_plus ^1.6.0's transitive requirement
  # (package_info_plus ^10.0.0). Issue #139 originally proposed ^8.1.4 but
  # that constraint is unsolvable while wakelock_plus stays on 1.6.x.
  package_info_plus: ^10.1.0
  
  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code generation
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.4
  # Resolves to a 3.2.6-dev prerelease: the latest freezed stable (3.2.5) caps
  # analyzer below 12, but drift_dev 2.34 + riverpod_generator 4.0.4 require
  # analyzer 12. freezed is a build-time-only codegen dep and its output is
  # committed + covered by the test suite; drop the prerelease once a freezed
  # stable supports analyzer 12 (#126).
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  drift_dev: ^2.34.0
  
  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: ^1.24.0
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "app_icon.png"
  web:
    generate: true
    image_path: "app_icon.png"
    background_color: "#0D0D0D"
    theme_color: "#0D0D0D"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  # Generate gen_l10n localizations (config in l10n.yaml). Output dir
  # lib/l10n/gen/ is gitignored and regenerated by `flutter pub get`.
  generate: true

  # Assets configuration
  assets:
    - assets/images/
    # Sound effects (#516): dartHit / dartMiss / bust, played via SoundService.
    - assets/sounds/
    # On-device auto-scorer model (#377/#378). Produced from the trained .pt by
    # deep-darts-probe's dart-train/export_mobile.py — see
    # docs/AUTO_SCORER_ENABLEMENT.md. ~11 MB; loaded via kAutoScorerModelAsset.
    - assets/models/dart_auto_scorer.tflite

